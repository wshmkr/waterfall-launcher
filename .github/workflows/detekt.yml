name: Detekt

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DETEKT_VERSION: "1.23.7"

jobs:
  detekt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache detekt CLI
        uses: actions/cache@v4
        with:
          path: detekt-cli.jar
          key: detekt-${{ env.DETEKT_VERSION }}

      - name: Download detekt CLI
        run: |
          if [ ! -f detekt-cli.jar ]; then
            curl -fsSL -o detekt-cli.jar \
              "https://github.com/detekt/detekt/releases/download/v${DETEKT_VERSION}/detekt-cli-${DETEKT_VERSION}-all.jar"
          fi

      - name: Run detekt
        run: |
          java -jar detekt-cli.jar \
            --input app/src \
            --config config/detekt.yml \
            --build-upon-default-config
